<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#111;color:#fff;display:flex;justify-content:center}
.app{width:100%;max-width:600px;height:100vh;display:flex;flex-direction:column}
header{padding:12px 16px;display:flex;align-items:center;border-bottom:1px solid #333}
header h1{flex:1;text-align:center;font-size:18px}
header button{background:transparent;border:none;font-size:22px;cursor:pointer;margin-left:12px;color:#fff}
.welcome{text-align:center;padding:40px 20px}
.welcome-icon{font-size:70px;margin-bottom:20px}
.welcome h2{font-size:24px;margin-bottom:8px}
.welcome p{color:#aaa;margin-bottom:20px}
.suggest{width:100%;padding:14px;margin:8px 0;background:#1f1f1f;border:1px solid #333;border-radius:12px;color:#fff;cursor:pointer}
.suggest:hover{background:#2a2a2a}
main{flex:1;overflow-y:auto;padding:16px}
.bubble{padding:10px 14px;border-radius:12px;margin:8px 0;max-width:75%}
.bubble.user{background:#2563eb;color:#fff;margin-left:auto}
.bubble.ai{background:#2a2a2a;color:#fff;margin-right:auto}
footer{display:flex;padding:12px;border-top:1px solid #333;gap:8px}
footer input{flex:1;padding:12px;border-radius:12px;border:1px solid #333;background:#1f1f1f;color:#fff}
footer button{padding:12px 16px;border:none;border-radius:12px;background:#2563eb;color:#fff;cursor:pointer;font-size:18px}
footer .icons{background:#1f1f1f;font-size:20px}
</style>
</head>
<body>
<div class="app">
  <header>
    <span class="status"></span>
    <h1>AI Tracker</h1>
    <button id="muteBtn">🔇</button>
    <button id="clearBtn">🗑️</button>
  </header>

  <main id="chatArea">
    <div class="welcome">
      <div class="welcome-icon">⚡</div>
      <h2>What can I do for you?</h2>
      <p>Type your request or use the buttons below to start with AI Tracker.</p>
      <button class="suggest">Making RAB and Project</button>
      <button class="suggest">Creating Gardens and Buildings</button>
      <button class="suggest">Repairing machines and making machines</button>
    </div>
  </main>

  <footer>
    <button class="icons">📎</button>
    <input type="text" id="promptInput" placeholder="Message AI Tracker">
    <button class="icons" id="micBtn">🎤</button>
    <button id="sendBtn">➤</button>
  </footer>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const promptInput = document.getElementById('promptInput');
const sendBtn = document.getElementById('sendBtn');
const clearBtn = document.getElementById('clearBtn');
const muteBtn = document.getElementById('muteBtn');
let muted = false;

function addMessage(text, sender) {
  if(chatArea.querySelector('.welcome')) chatArea.innerHTML = '';
  const bubble = document.createElement('div');
  bubble.className = `bubble ${sender}`;
  bubble.textContent = text;
  chatArea.appendChild(bubble);
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function sendMessage() {
  const text = promptInput.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  promptInput.value = '';
  addMessage('Thinking...', 'ai');
  
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({prompt: text})
    });
    const data = await res.json();
    chatArea.lastChild.textContent = data.reply || data.error || "AI error";
  } catch(e) {
    chatArea.lastChild.textContent = 'Error: Gagal konek ke /api/chat';
  }
}

sendBtn.onclick = sendMessage;
promptInput.onkeypress = e => { if(e.key==='Enter') sendMessage() };
document.querySelectorAll('.suggest').forEach(btn=>{
  btn.onclick = () => { promptInput.value = btn.textContent; sendMessage(); }
});
clearBtn.onclick = () => location.reload();
muteBtn.onclick = () => { muted = !muted; muteBtn.textContent = muted ? '🔊' : '🔇' };
</script>
</body>
  </html>
