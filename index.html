<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tracker</title>
<style>
body{margin:0;font-family:system-ui;background:#0b0b0c;color:#fff;display:flex;flex-direction:column;height:100vh}
header{padding:14px 16px;font-weight:700;background:#111;border-bottom:1px solid #222}
#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-row{display:flex}.user{justify-content:flex-end}.bot{justify-content:flex-start}
.bubble{max-width:75%;padding:12px 14px;border-radius:18px;cursor:pointer;position:relative}
.user.bubble{background:#2a2a2a}.bot.bubble{background:#1a1a1a}
#footer{display:flex;gap:8px;padding:10px;border-top:1px solid #222;background:#111}
#footer input{flex:1;padding:12px;border-radius:20px;border:none;background:#222;color:#fff;outline:none}
.icon-btn{background:#222;border:none;color:#fff;padding:10px 12px;border-radius:50%;font-size:18px;cursor:pointer}
.icon-btn.recording{background:red}
#chatMenu{position:absolute;background:#222;border:1px solid #333;border-radius:8px;padding:6px 10px;display:none;z-index:99}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;padding:8px 14px;border-radius:20px;font-size:13px;display:none}
</style>
</head>
<body>
<header>AI Tracker</header>
<div id="chat"></div>

<div id="footer">
  <button id="galleryBtn" class="icon-btn">🖼️</button>
  <input id="promptInput" placeholder="Message AI Tracker">
  <button id="micBtn" class="icon-btn">🎤</button>
  <button id="muteBtn" class="icon-btn">🔊</button>
  <button id="sendBtn" class="icon-btn">➤</button>
</div>

<div id="chatMenu"><div id="deleteBtn">Hapus</div></div>
<div id="toast" class="toast"></div>

<script>
const chat = document.getElementById('chat');
const promptInput = document.getElementById('promptInput');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const galleryBtn = document.getElementById('galleryBtn');
const muteBtn = document.getElementById('muteBtn');
const chatMenu = document.getElementById('chatMenu');
const toast = document.getElementById('toast');
let pendingImage = null;
let muted = false;
let selectedBubble = null;

function showToast(msg){
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(()=>toast.style.display='none',2000);
}

function addBubble(text, who){
  const row = document.createElement('div');
  row.className = 'chat-row ' + who;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  bubble.onclick = (e)=>{
    selectedBubble = bubble;
    chatMenu.style.left = e.pageX+'px';
    chatMenu.style.top = e.pageY+'px';
    chatMenu.style.display = 'block';
  }
  row.appendChild(bubble);
  chat.appendChild(row);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){
  const text = promptInput.value.trim();
  if(!text &&!pendingImage) return;
  if(text) addBubble(text, 'user');
  if(pendingImage) addBubble('[Gambar terkirim]', 'user');
  promptInput.value = '';
  const imageToSend = pendingImage;
  pendingImage = null;
  promptInput.placeholder = "Message AI Tracker";
  addBubble('thinking...', 'bot');
  try{
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({prompt: text || "Jelaskan gambar ini", image: imageToSend})
    });
    const data = await res.json();
    chat.lastChild.querySelector('.bubble').textContent = data.reply || data.error;
    if(!muted) speechSynthesis.speak(new SpeechSynthesisUtterance(data.reply));
  }catch{
    chat.lastChild.querySelector('.bubble').textContent = 'Error koneksi';
  }
}

// GALLERY
galleryBtn.onclick = () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'image/*';
  input.onchange = e => {
    const file = e.target.files[0];
    if(file){
      const reader = new FileReader();
      reader.onload = () => {
        pendingImage = reader.result;
        promptInput.placeholder = "Tambah keterangan untuk gambar...";
        showToast('Gambar siap');
        sendMessage();
      }
      reader.readAsDataURL(file);
    }
  }
  input.click();
}

// MIC
micBtn.onclick = () => {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition) return showToast('Tidak support voice');
  const rec = new SpeechRecognition();
  rec.lang = 'id-ID';
  rec.onstart = () => micBtn.classList.add('recording');
  rec.onend = () => micBtn.classList.remove('recording');
  rec.onresult = e => {
    promptInput.value = e.results[0][0].transcript;
    sendMessage();
  }
  rec.start();
}

// SEND + LAINNYA
sendBtn.onclick = sendMessage;
promptInput.onkeypress = e => { if(e.key==='Enter'){sendMessage()} };
document.getElementById('deleteBtn').onclick = () => {
  if(selectedBubble){
    selectedBubble.closest('.chat-row').remove();
    showToast('Dihapus');
    chatMenu.style.display = 'none';
  }
}
document.onclick = (e) => { if(!chatMenu.contains(e.target)) chatMenu.style.display = 'none' }
muteBtn.onclick = () => { muted =!muted; muteBtn.textContent = muted? '🔇' : '🔊'; if(muted) speechSynthesis.cancel(); }
</script>
</body>
</html>
