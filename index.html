<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tracker</title>
<link rel="stylesheet" href="src/style.css">
</head>
<body>
<div class="container">
  <!-- INI BAR HEAD -->
  <div class="header">
    <div class="header-left">
      <span class="dot"></span>
      <h1>AI Tracker</h1>
    </div>
    <div class="header-right">
      <button id="muteBtn">🔇</button>
      <button id="clearBtn">🗑️</button>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="welcome">
      <div class="welcome-icon">💬</div>
      <h2>What can I do for you?</h2>
      <p>Type your request or use the buttons below to start with AI Tracker.</p>
      <button class="suggest">Making RAB and Project</button>
      <button class="suggest">Creating Gardens and Buildings</button>
      <button class="suggest">Repairing machines and making machines</button>
    </div>
  </div>

  <div class="input-area">
    <button class="icon-btn">📎</button>
    <input type="text" id="promptInput" placeholder="2x2">
    <button class="icon-btn" id="micBtn">🎤</button>
    <button class="send-btn" id="sendBtn">➤</button>
  </div>
</div>
<script src="src/script.js"></script>
</body>
</html>
