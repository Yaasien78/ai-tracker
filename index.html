<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#111;color:#fff;display:flex;justify-content:center}
.app{width:100%;max-width:600px;height:100vh;display:flex;flex-direction:column}
header{padding:12px 16px;display:flex;align-items:center;border-bottom:1px solid #333;justify-content:space-between}
header h1{font-size:18px}
header.icons{display:flex;gap:12px}
header button{background:transparent;border:none;font-size:22px;cursor:pointer;color:#fff}
.welcome{text-align:center;padding:40px 20px}
.welcome-icon{font-size:70px;margin-bottom:20px}
.suggest{width:100%;padding:14px;margin:8px 0;background:#1f1f1f;border:1px solid #333;border-radius:12px;color:#fff;cursor:pointer}
main{flex:1;overflow-y:auto;padding:16px}
.chat-row{display:flex;gap:8px;margin:8px 0;align-items:flex-end}
.chat-row.user{justify-content:flex-end}
.avatar{width:28px;height:28px;border-radius:50%;background:#2563eb;display:flex;align-items:center;justify-content:center;font-size:14px}
.avatar.ai{background:#ff6b00}
.bubble{padding:10px 14px;border-radius:12px;max-width:75%;line-height:1.5}
.bubble.user{background:#2563eb;color:#fff}
.bubble.ai{background:#2a2a2a;color:#fff}
.bubble-name{font-size:11px;color:#aaa;margin-bottom:4px}
footer{display:flex;padding:12px;border-top:1px solid #333;gap:8px;align-items:center}
footer input{flex:1;padding:12px;border-radius:12px;border:1px solid #333;background:#1f1f1f;color:#fff}
footer button{padding:12px;border:none;border-radius:12px;background:#1f1f1f;color:#fff;cursor:pointer;font-size:20px}
#sendBtn{background:#2563eb}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>AI Tracker</h1>
    <div class="icons">
      <button id="muteBtn" title="Speaker">🔇</button>
      <button id="clearBtn" title="Clear">🗑️</button>
    </div>
  </header>

  <main id="chatArea">
    <div class="welcome">
      <div class="welcome-icon">⚡</div>
      <h2>What can I do for you?</h2>
      <p style="color:#aaa;margin-bottom:20px">Type your request or use the buttons below</p>
      <button class="suggest">Making RAB and Project</button>
      <button class="suggest">Creating Gardens and Buildings</button>
      <button class="suggest">Repairing machines and making machines</button>
    </div>
  </main>

  <footer>
    <button id="attachBtn" title="Download Chat">📎</button>
    <input type="text" id="promptInput" placeholder="Message AI Tracker">
    <button id="micBtn" title="Voice">🎤</button>
    <button id="sendBtn">➤</button>
  </footer>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const promptInput = document.getElementById('promptInput');
const sendBtn = document.getElementById('sendBtn');
const clearBtn = document.getElementById('clearBtn');
const muteBtn = document.getElementById('muteBtn');
const micBtn = document.getElementById('micBtn');
const attachBtn = document.getElementById('attachBtn');
let muted = false;
let chatHistory = [];

function addMessage(text, sender) {
  if(chatArea.querySelector('.welcome')) chatArea.innerHTML = '';

  const row = document.createElement('div');
  row.className = `chat-row ${sender}`;

  const avatar = document.createElement('div');
  avatar.className = `avatar ${sender}`;
  avatar.textContent = sender==='user'? 'U' : 'AI';

  const bubbleWrap = document.createElement('div');
  const name = document.createElement('div');
  name.className = 'bubble-name';
  name.textContent = sender==='user'? 'You' : 'AI Tracker';

  const bubble = document.createElement('div');
  bubble.className = `bubble ${sender}`;
  bubble.textContent = text;

  bubbleWrap.appendChild(name);
  bubbleWrap.appendChild(bubble);

  if(sender==='user') row.append(bubbleWrap, avatar);
  else row.append(avatar, bubbleWrap);

  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight;
  chatHistory.push({sender, text});
}

async function sendMessage() {
  const text = promptInput.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  promptInput.value = '';
  addMessage('Thinking...', 'ai');

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({prompt: text})
    });
    const data = await res.json();
    chatArea.lastChild.querySelector('.bubble').textContent = data.reply || data.error;
  } catch(e) {
    chatArea.lastChild.querySelector('.bubble').textContent = 'Error: Gagal konek ke /api/chat';
  }
}

// 1. Kirim
sendBtn.onclick = sendMessage;
promptInput.onkeypress = e => { if(e.key==='Enter') sendMessage() };

// 2. Suggest
document.querySelectorAll('.suggest').forEach(btn=>{
  btn.onclick = () => { promptInput.value = btn.textContent; sendMessage(); }
});

// 3. Sampah - Clear Chat
clearBtn.onclick = () => {
  chatHistory = [];
  location.reload();
};

// 4. Speaker - Mute/Unmute
muteBtn.onclick = () => {
  muted =!muted;
  muteBtn.textContent = muted? '🔊' : '🔇';
  alert(muted? 'Speaker Dimatikan' : 'Speaker Dinyalakan');
}

// 5. Mic - Voice to Text
micBtn.onclick = () => {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition) return alert('Browser tidak support voice');
  const rec = new SpeechRecognition();
  rec.lang = 'en-US';
  rec.onresult = e => { promptInput.value = e.results[0][0].transcript; }
  rec.start();
}

// 6. Download - Export Chat
attachBtn.onclick = () => {
  const txt = chatHistory.map(c => `${c.sender==='user'?'You':'AI Tracker'}: ${c.text}`).join('\n\n');
  const blob = new Blob([txt], {type:'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'AI-Tracker-Chat.txt';
  a.click();
}
</script>
</body>
  </html>
