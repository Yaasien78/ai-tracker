<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AI Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui, -apple-system, sans-serif}
html,body{height:100%;background:#000;color:#fff;overflow:hidden}
.app{width:100%;height:100%;display:flex;flex-direction:column}

header{padding:10px 12px;display:flex;align-items:center;border-bottom:1px solid #1a1a1a;justify-content:space-between;background:#000;flex-shrink:0;position:sticky;top:0;z-index:10} /* FIX HEADER */
.header-left{display:flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;background:#3b82f6;border-radius:50%}
header h1{font-size:15px;font-weight:600}
header.icons{display:flex;gap:12px}
header button{background:transparent;border:none;font-size:18px;cursor:pointer;color:#ccc}

.welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 12px;overflow-y:auto}
.welcome-icon{width:56px;height:56px;border-radius:50%;background:#111;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.welcome-icon span{font-size:26px}
.welcome h2{font-size:18px;margin-bottom:6px;font-weight:600}
.welcome p{color:#888;font-size:12.5px;line-height:1.4;margin-bottom:20px}
.suggest-wrap{width:100%}
.suggest{width:100%;padding:12px;margin:6px 0;background:#1a1a1a;border:1px solid #262626;border-radius:10px;color:#fff;cursor:pointer;font-size:13.5px;text-align:center}

main{flex:1;overflow-y:auto;padding:8px 12px} /* FIX SCROLL */
.chat-row{display:flex;gap:6px;margin:10px 0;align-items:flex-start}
.chat-row.user{justify-content:flex-end}
.avatar{width:26px;height:26px;border-radius:50%;background:#2563eb;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.avatar.ai{background:#f97316}
.bubble-wrap{display:flex;flex-direction:column;max-width:78%}
.bubble{padding:9px 12px;border-radius:14px;line-height:1.4;font-size:13.5px}
.bubble.user{background:#2563eb;color:#fff;border-bottom-right-radius:4px}
.bubble.ai{background:#1a1a1a;color:#e5e5e5;border:1px solid #262626;border-bottom-left-radius:4px}
.bubble-name{font-size:10.5px;color:#777;margin:0 2px 3px 2px}

footer{display:flex;padding:8px 10px;border-top:1px solid #1a1a1a;gap:5px;align-items:center;background:#000;flex-shrink:0;position:sticky;bottom:0;z-index:10} /* FIX FOOTER */
.footer-btn{padding:9px 8px;border:none;border-radius:10px;background:#111;color:#aaa;cursor:pointer;font-size:18px;flex-shrink:0;width:40px;height:40px;display:flex;align-items:center;justify-content:center}
footer input{flex:1;min-width:0;padding:10px 12px;border-radius:10px;border:1px solid #262626;background:#111;color:#fff;font-size:13.5px}
#sendBtn{background:#2563eb;color:#fff;width:40px;height:40px}
footer button.recording{background:#22c55e!important;color:#fff}
.toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:10px 16px;border-radius:8px;font-size:13px;z-index:99;display:none}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <div class="dot"></div>
      <h1>AI Tracker</h1>
    </div>
    <div class="icons">
      <button id="downloadBtn" title="Download Chat">⬇️</button> <!-- TOMBOL DOWNLOAD BARU -->
      <button id="muteBtn">🔊</button>
      <button id="clearBtn">🗑️</button>
    </div>
  </header>

  <main id="chatArea">
      <div class="welcome">
        <div class="welcome-icon"><span>💬</span></div>
        <h2>What can I do for you?</h2>
        <p>Type your request or use the buttons below to start with AI Tracker.</p>
        <div class="suggest-wrap">
          <button class="suggest">Making RAB and Project</button>
          <button class="suggest">Creating Gardens and Buildings</button>
          <button class="suggest">Repairing machines and making machines</button>
        </div>
      </div>
  </main>

  <footer>
    <button id="galleryBtn" class="footer-btn">🖼️</button>
    <input type="text" id="promptInput" placeholder="Message AI Tracker">
    <button id="micBtn" class="footer-btn">🎤</button>
    <button id="sendBtn" class="footer-btn">➤</button>
  </footer>
  <div id="toast" class="toast">Chat berhasil di download!</div>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const promptInput = document.getElementById('promptInput');
const sendBtn = document.getElementById('sendBtn');
const clearBtn = document.getElementById('clearBtn');
const muteBtn = document.getElementById('muteBtn');
const micBtn = document.getElementById('micBtn');
const galleryBtn = document.getElementById('galleryBtn');
const downloadBtn = document.getElementById('downloadBtn');
const toast = document.getElementById('toast');
let muted = false;
let chatHistory = [];

function showToast(msg){
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(()=>toast.style.display='none', 2000);
}

function speak(text) {
  if(muted) return;
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'id-ID'; // ganti ke bahasa indo biar pas
  speechSynthesis.cancel();
  speechSynthesis.speak(utterance);
}

function addMessage(text, sender) {
  if(chatArea.querySelector('.welcome')) chatArea.innerHTML = '';
  const row = document.createElement('div');
  row.className = `chat-row ${sender}`;
  const avatar = document.createElement('div');
  avatar.className = `avatar ${sender}`;
  avatar.textContent = sender==='user'? 'U' : 'AI';
  const bubbleWrap = document.createElement('div');
  bubbleWrap.className = 'bubble-wrap';
  const name = document.createElement('div');
  name.className = 'bubble-name';
  name.textContent = sender==='user'? 'You' : 'AI Tracker';
  const bubble = document.createElement('div');
  bubble.className = `bubble ${sender}`;
  bubble.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
  bubbleWrap.append(name,bubble);
  if(sender==='user') row.append(bubbleWrap, avatar); else row.append(avatar, bubbleWrap);
  chatArea.appendChild(row);
  chatArea.scrollTop = chatArea.scrollHeight; // auto scroll ke bawah
  chatHistory.push({sender, text});
  if(sender==='ai' && text!=='Thinking...') speak(text);
}

async function sendMessage() {
  const text = promptInput.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  promptInput.value = '';
  addMessage('Thinking...', 'ai');
  try {
    const res = await fetch('/api/chat', {method: 'POST',headers: {'Content-Type':'application/json'},body: JSON.stringify({prompt: text})});
    const data = await res.json();
    chatArea.lastChild.querySelector('.bubble').innerHTML = (data.reply || data.error).replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
    if(data.reply) speak(data.reply);
  } catch(e) {
    chatArea.lastChild.querySelector('.bubble').textContent = 'Error: Gagal konek ke /api/chat';
  }
}

// DOWNLOAD CHAT
downloadBtn.onclick = () => {
  if(chatHistory.length === 0) return alert('Belum ada chat untuk di download');
  let content = chatHistory.map(m => `${m.sender === 'user'? 'You' : 'AI Tracker'}: ${m.text}`).join('\n\n');
  const blob = new Blob([content], {type: 'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `AI-Tracker-Chat-${new Date().toLocaleDateString()}.txt`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Chat berhasil di download!');
}

sendBtn.onclick = sendMessage;
promptInput.onkeypress = e => { if(e.key==='Enter') sendMessage() };
document.querySelectorAll('.suggest').forEach(btn=>{btn.onclick = () => { promptInput.value = btn.textContent; sendMessage(); }});
clearBtn.onclick = () => { chatHistory = []; speechSynthesis.cancel(); location.reload(); };
muteBtn.onclick = () => {muted =!muted;muteBtn.textContent = muted? '🔇' : '🔊';if(muted) speechSynthesis.cancel();}

// MIC FIX: langsung kirim setelah selesai ngomong
micBtn.onclick = () => {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition) return alert('Browser tidak support voice');
  const rec = new SpeechRecognition();
  rec.lang = 'id-ID'; // biar bisa bahasa indo
  rec.onstart = () => micBtn.classList.add('recording');
  rec.onend = () => micBtn.classList.remove('recording');
  rec.onresult = e => {
    promptInput.value = e.results[0][0].transcript;
    sendMessage(); // LANGSUNG KIRIM
  }
  rec.start();
}
galleryBtn.onclick = () => {const input = document.createElement('input');input.type = 'file'; input.accept = 'image/*'; input.click();}
</script>
</body>
    </html>
