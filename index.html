<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Tracker</title>
<link rel="stylesheet" href="src/style.css">
</head>
<body>
<div class="app">
  <!-- BAR HEAD -->
  <header>
    <span class="status"></span>
    <h1>AI Tracker</h1>
    <button class="icons" id="muteBtn">🔇</button>
    <button class="icons" id="clearBtn">🗑️</button>
  </header>

  <!-- AREA CHAT -->
  <main id="chatArea">
    <div class="welcome">
      <div class="welcome-icon"></div>
      <h2>What can I do for you?</h2>
      <p>Type your request or use the buttons below to start with AI Tracker.</p>
      <button class="suggest">Making RAB and Project</button>
      <button class="suggest">Creating Gardens and Buildings</button>
      <button class="suggest">Repairing machines and making machines</button>
    </div>
  </main>

  <!-- FOOTER INPUT -->
  <footer>
    <button class="icons">📎</button>
    <input type="text" id="promptInput" placeholder="Message AI Tracker">
    <button class="icons" id="micBtn">🎤</button>
    <button id="sendBtn">➤</button>
  </footer>
</div>
<script src="src/script.js"></script>
</body>
  </html>
