<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Tracker</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <div class="app">
    <header>
      <div class="status"></div>
      <h1>AI Tracker</h1>
      <div class="icons">
        <button id="muteBtn">🔇</button>
        <button id="clearBtn">🗑️</button>
      </div>
    </header>

    <main id="chatArea">
      <div class="welcome">
        <div class="welcome-icon">💬</div>
        <h2>What can I do for you?</h2>
        <p>Type your request or use the buttons below to start with AI Tracker.</p>

        <button class="suggest">Making RAB and Project</button>
        <button class="suggest">Creating Gardens and Buildings</button>
        <button class="suggest">Repairing machines and making machines</button>
      </div>
    </main>

    <footer>
      <button id="attachBtn">📎</button>
      <input type="text" id="promptInput" placeholder="Tulis pesan...">
      <button id="micBtn">🎤</button>
      <button id="sendBtn">⬆️</button>
    </footer>
  </div>
  
  <script src="./src/script.js"></script>
</body>
        </html>
